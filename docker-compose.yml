services:
  db:
    image: postgres:15-alpine
    container_name: hormonitas-db
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Bind solo a localhost del VPS — postgres NO expuesto a internet
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hormonitas-app
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Galería de fotos subidas por la novia — persiste fuera del contenedor
      # para no perderse al rebuilds. El path en host es ./uploads/galeria.
      - ./uploads/galeria:/app/public/galeria

volumes:
  postgres_data:
    name: hormonitas_postgres_data
