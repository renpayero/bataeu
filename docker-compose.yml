version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: hormonitas
      POSTGRES_PASSWORD: hormonitas123
      POSTGRES_DB: hormonitas
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hormonitas"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://hormonitas:hormonitas123@db:5432/hormonitas
      NODE_ENV: production

volumes:
  postgres_data:
